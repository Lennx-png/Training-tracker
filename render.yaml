services:
  - type: web
    name: training-tracker
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: training-db
          property: connectionString
      - key: APP_PIN
        value: 1234
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: training-db
    plan: free

services:
  - type: web
    name: training-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: training-db
          property: connectionString
      - key: APP_PIN
        value: 1234
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: training-db
    plan: free

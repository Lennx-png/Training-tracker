{% extends "base.html" %}
{% block content %}
<div class="space-y-4">
    <h1 class="text-2xl font-bold">Körpergewicht</h1>

    <form method="POST" action="/weight" class="bg-stone-900 rounded-2xl p-4 border border-stone-800">
        <div class="flex gap-3 items-end">
            <div class="flex-1">
                <label class="text-xs text-stone-500 mb-1 block">Gewicht (kg)</label>
                <input type="number" name="weight" step="0.1" required placeholder="75.0"
                       class="w-full bg-stone-800 border border-stone-700 rounded-xl px-4 py-3 text-white text-lg placeholder-stone-600 focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold px-6 py-3 rounded-xl transition-colors">
                +
            </button>
        </div>
        <input type="text" name="notes" placeholder="Notiz (optional)"
               class="w-full mt-2 bg-stone-800 border border-stone-700 rounded-xl px-4 py-2 text-sm text-white placeholder-stone-600 focus:outline-none focus:ring-1 focus:ring-emerald-500">
    </form>

    {% if entries %}
    <div class="bg-stone-900 rounded-2xl p-4 border border-stone-800">
        <h2 class="text-sm font-medium text-stone-400 mb-3">Verlauf</h2>
        <canvas id="weightChart" height="150"></canvas>
    </div>
    <script>
        const wCtx = document.getElementById('weightChart');
        new Chart(wCtx, {
            type: 'line',
            data: {
                labels: [{% for e in entries %}'{{ e.date.strftime("%d.%m") }}'{% if not loop.last %},{% endif %}{% endfor %}],
                datasets: [{
                    data: [{% for e in entries %}{{ e.weight }}{% if not loop.last %},{% endif %}{% endfor %}],
                    borderColor: '#34d399',
                    backgroundColor: 'rgba(52, 211, 153, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#34d399',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#78716c', font: { size: 10 } } },
                    y: { grid: { color: '#292524' }, ticks: { color: '#78716c', font: { size: 10 } } }
                }
            }
        });
    </script>

    <div class="space-y-1.5">
        {% for e in entries|reverse %}
        <div class="flex items-center justify-between bg-stone-900 rounded-lg px-4 py-2.5 border border-stone-800">
            <div>
                <span class="font-medium">{{ e.weight }} kg</span>
                {% if e.notes %}
                <span class="text-xs text-stone-500 ml-2">{{ e.notes }}</span>
                {% endif %}
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs text-stone-500">{{ e.date.strftime('%d.%m.%Y') }}</span>
                <form method="POST" action="/weight/delete/{{ e.id }}" onsubmit="return confirm('Löschen?')">
                    <button type="submit" class="text-red-400 hover:text-red-300 text-xs">✕</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-12 text-stone-500">
        <p>Noch keine Gewichtsdaten</p>
    </div>
    {% endif %}
</div>
{% endblock %}

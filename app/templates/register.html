{% extends "base.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-2">Registrieren</h1>
        <p class="text-stone-400 text-center text-sm mb-8">Erstelle ein neues Konto</p>

        {% if error %}
        <div class="bg-red-900/50 border border-red-700 text-red-200 px-4 py-3 rounded-lg mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-stone-300 mb-1">Name</label>
                <input type="text" name="name" required
                    class="w-full bg-stone-800 border border-stone-700 rounded-lg px-4 py-3 text-stone-100 placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                    placeholder="Dein Name">
            </div>
            <div>
                <label class="block text-sm font-medium text-stone-300 mb-1">PIN</label>
                <input type="password" name="pin" required minlength="3"
                    class="w-full bg-stone-800 border border-stone-700 rounded-lg px-4 py-3 text-stone-100 placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                    placeholder="Mindestens 3 Zeichen">
            </div>
            <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
                Registrieren
            </button>
        </form>

        <p class="text-center text-stone-400 text-sm mt-6">
            Bereits registriert?
            <a href="/login" class="text-emerald-400 hover:text-emerald-300 font-medium">Anmelden</a>
        </p>
    </div>
</div>
{% endblock %}
